<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<script type="module" src="main.js" defer></script>
		<title>Vanilla Javascript Todo App</title>
	</head>
	<body>
		<!-- Removed duplicate h1 -->
		<div
			id="root"
			class="min-h-screen bg-white flex flex-col items-center justify-center py-8 rounded-lg shadow-md max-w-xl mx-auto mt-10">
			<h1
				class="text-3xl font-extrabold text-gray-900 mb-6 tracking-tight drop-shadow-sm bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 text-transparent bg-clip-text">
				Vanilla Javascript Todo App
			</h1>
			<button
				id="addBtn"
				type="button"
				class="px-5 py-2 mb-6 bg-blue-500 text-white font-bold rounded shadow hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-300 transition"
				aria-label="Add New Todo">
				Add New Todo
			</button>
			<!-- Todo list will be rendered here by JS -->
			<div id="todo-list"></div>
		</div>
	</body>
</html>
